name: Database Backup

# Kostenloser Ersatz für automatische Supabase-Backups (nicht im Free-Tier
# enthalten). Zieht täglich einen vollständigen, verschlüsselten Dump und
# legt ihn als GitHub-Actions-Artefakt ab. retention-days sorgt gleichzeitig
# für die im Datenschutz-Referenzdokument festgehaltene rollierende
# Aufbewahrungsfrist — ältere Backups werden automatisch gelöscht.

on:
  schedule:
    - cron: "0 3 * * *" # täglich 03:00 UTC
  workflow_dispatch: {} # zum manuellen Testen im Actions-Tab

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: PostgreSQL-17-Client installieren
        # Ubuntus eigenes Repo liefert nur Version 16, der Supabase-Server
        # läuft aber auf Postgres 17 — pg_dump verweigert den Dump, wenn seine
        # eigene Version älter als die des Servers ist. Daher gezielt v17 über
        # das offizielle PostgreSQL-APT-Repository (PGDG) installieren.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl ca-certificates gnupg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql-keyring.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-17

      - name: Datenbank sichern
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        # Explizit nur public (App-Tabellen: profiles, progress, lernnachweise,
        # trainer_trainees, ai_usage) und auth (die eigentlichen User-Konten,
        # nötig damit die Fremdschlüssel auf profiles.id beim Restore stimmen)
        # — statt der pg_dump-Vorgabe "alle erreichbaren Schemas", die auch
        # interne Supabase-Systemschemas (storage, realtime, vault, ...)
        # mitziehen würde, was weder nötig ist noch garantiert fehlerfrei läuft.
        run: pg_dump "$DATABASE_URL" --no-owner --no-privileges -F c --schema=public --schema=auth -f backup.dump

      - name: Enthaltene Tabellen protokollieren
        run: pg_restore --list backup.dump | grep "TABLE DATA" || true

      - name: Backup verschlüsseln
        env:
          PASSPHRASE: ${{ secrets.BACKUP_ENCRYPTION_PASSPHRASE }}
        run: |
          gpg --batch --yes --symmetric --cipher-algo AES256 --passphrase "$PASSPHRASE" backup.dump
          rm backup.dump

      - name: Verschlüsseltes Backup hochladen
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backup.dump.gpg
          retention-days: 30
